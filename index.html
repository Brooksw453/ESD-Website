<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Simulation Designs | VR Development, Games & AI</title>
    <meta name="description" content="Education Simulation Designs - Immersive VR development, indie games, and custom AI agent solutions.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; frame-src https://brooksw453.github.io; connect-src 'self' https://formsubmit.co;">

    <!-- Open Graph -->
    <meta property="og:title" content="Education Simulation Designs">
    <meta property="og:description" content="VR Development, Indie Games, AI Agents">
    <meta property="og:image" content="assets/images/elliptical/cover.png">
    <meta property="og:url" content="https://esdesigns.org">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/brand/favicon.svg">
    <link rel="apple-touch-icon" href="assets/images/brand/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Particle Canvas (behind everything) -->
    <canvas id="particle-canvas"></canvas>

    <!-- Site Header / Navigation -->
    <header class="site-header" id="siteHeader">
        <a href="#/" class="nav-brand">ES Designs</a>
        <nav class="nav-links" id="navLinks">
            <a href="#/" class="nav-link" data-page="home">Home</a>
            <a href="#/vr" class="nav-link" data-page="vr">VR Development</a>
            <a href="#/games" class="nav-link" data-page="games">Games</a>
            <a href="#/ai" class="nav-link" data-page="ai">AI Development</a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- Main Content (swapped by router) -->
    <main id="page-content">
        <!-- Page fragments loaded here -->
    </main>

    <!-- Site Footer -->
    <footer class="site-footer" id="siteFooter">
        <div class="footer-top">
            <a href="#/" class="footer-logo-link" aria-label="Home">
                <img src="assets/images/brand/esd-logo.png" alt="ESD" class="footer-logo">
                <div class="footer-logo-glow"></div>
            </a>
            <div class="footer-main">
                <div class="footer-links">
                    <a href="#/">Home</a>
                    <a href="#/vr">VR Development</a>
                    <a href="#/games">Games</a>
                    <a href="#/ai">AI Development</a>
                    <a href="#/privacy">Privacy Policy</a>
                </div>
                <p class="footer-copy">&copy; 2025&ndash;2026 Education Simulation Designs. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Contact Widget -->
    <div class="contact-widget" id="contactWidget">
        <div class="contact-panel" id="contactPanel">
            <div class="contact-panel-header">
                <h4 class="contact-panel-title">Get In Touch</h4>
                <button class="contact-panel-close" id="contactClose" aria-label="Close contact panel">&times;</button>
            </div>
            <div class="contact-quick-actions">
                <a href="mailto:bwinchell@esdesigns.org" class="contact-action-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                    Email Us
                </a>
                <a href="#/vr" class="contact-action-btn" onclick="document.getElementById('contactWidget').classList.remove('open')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8a4 4 0 014-4h12a4 4 0 014 4v2a4 4 0 01-4 4h-1l-3 4-3-4H6a4 4 0 01-4-4V8z"/><circle cx="8" cy="9" r="1" fill="currentColor"/><circle cx="16" cy="9" r="1" fill="currentColor"/></svg>
                    VR Projects
                </a>
            </div>
            <div class="contact-divider"></div>
            <form id="contactForm" action="https://formsubmit.co/ajax/bwinchell@esdesigns.org" method="POST">
                <input type="hidden" name="_subject" value="New message from esdesigns.org">
                <input type="text" name="_honey" style="display:none">
                <input type="hidden" name="_captcha" value="false">
                <div class="contact-form-field">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="contact-form-field">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="contact-form-field">
                    <textarea name="message" placeholder="Your Message" rows="3" required></textarea>
                </div>
                <button type="submit" class="neon-btn contact-submit-btn">Send Message</button>
                <div class="contact-form-status" id="contactFormStatus"></div>
            </form>
        </div>
        <button class="contact-fab" id="contactFab" aria-label="Contact us" aria-expanded="false">
            <svg class="contact-fab-icon-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <svg class="contact-fab-icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <!-- Music Player (persistent, fixed bottom) - Compact single-line bar -->
    <div class="music-player" id="musicPlayer">
        <div class="player-progress" id="playerProgress">
            <div class="player-progress-fill" id="progressFill"></div>
        </div>
        <div class="player-bar" id="playerBar">
            <button class="player-btn" id="prevBtn" aria-label="Previous track">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="19 20 9 12 19 4 19 20"></polygon>
                    <line x1="5" y1="19" x2="5" y2="5"></line>
                </svg>
            </button>
            <button class="player-btn player-btn-main" id="playPauseBtn" aria-label="Play">
                <svg id="playIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg id="pauseIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button class="player-btn" id="nextBtn" aria-label="Next track">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="5 4 15 12 5 20 5 4"></polygon>
                    <line x1="19" y1="5" x2="19" y2="19"></line>
                </svg>
            </button>
            <span class="player-track-name" id="trackName">Loading...</span>
            <button class="player-btn player-expand-btn" id="expandBtn" aria-label="Expand player">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </button>
        </div>
        <div class="player-visualizer-row" id="visualizerRow">
            <canvas id="visualizerCanvas" class="visualizer-canvas"></canvas>
        </div>
        <!-- Expandable panel (hidden by default) -->
        <div class="player-expanded" id="playerExpanded">
            <div class="player-expanded-volume">
                <button class="player-btn" id="muteBtn" aria-label="Toggle mute">
                    <svg id="volumeOnIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <svg id="volumeOffIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                </button>
                <input type="range" id="volumeSlider" class="volume-slider"
                       min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="player-tracklist" id="trackList"></div>
        </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioElement" preload="metadata"></audio>

    <!-- Scripts -->
    <script src="js/particles.js"></script>
    <script src="js/music-player.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script src="js/router.js"></script>
    <script src="js/contact-widget.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
