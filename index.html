<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Simulation Designs | VR Development, Games & AI</title>
    <meta name="description" content="Education Simulation Designs - Immersive VR development, indie games, and custom AI agent solutions.">

    <!-- Open Graph -->
    <meta property="og:title" content="Education Simulation Designs">
    <meta property="og:description" content="VR Development, Indie Games, AI Agents">
    <meta property="og:image" content="assets/images/elliptical/cover.png">
    <meta property="og:url" content="https://esdesigns.org">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/brand/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Particle Canvas (behind everything) -->
    <canvas id="particle-canvas"></canvas>

    <!-- Site Header / Navigation -->
    <header class="site-header" id="siteHeader">
        <a href="#/" class="nav-brand">ES Designs</a>
        <nav class="nav-links" id="navLinks">
            <a href="#/" class="nav-link" data-page="home">Home</a>
            <a href="#/vr" class="nav-link" data-page="vr">VR Development</a>
            <a href="#/games" class="nav-link" data-page="games">Games</a>
            <a href="#/ai" class="nav-link" data-page="ai">AI Development</a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- Main Content (swapped by router) -->
    <main id="page-content">
        <!-- Page fragments loaded here -->
    </main>

    <!-- Site Footer -->
    <footer class="site-footer" id="siteFooter">
        <div class="footer-brand">Education Simulation Designs</div>
        <div class="footer-links">
            <a href="#/">Home</a>
            <a href="#/vr">VR Development</a>
            <a href="#/games">Games</a>
            <a href="#/ai">AI Development</a>
        </div>
        <p class="footer-copy">&copy; 2024 Education Simulation Designs. All rights reserved.</p>
    </footer>

    <!-- Music Player (persistent, fixed bottom) -->
    <div class="music-player" id="musicPlayer">
        <div class="player-progress" id="playerProgress">
            <div class="player-progress-fill" id="progressFill"></div>
        </div>
        <div class="player-controls">
            <button class="player-btn" id="prevBtn" aria-label="Previous track">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="19 20 9 12 19 4 19 20"></polygon>
                    <line x1="5" y1="19" x2="5" y2="5"></line>
                </svg>
            </button>
            <button class="player-btn player-btn-main" id="playPauseBtn" aria-label="Play">
                <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg id="pauseIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button class="player-btn" id="nextBtn" aria-label="Next track">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 4 15 12 5 20 5 4"></polygon>
                    <line x1="19" y1="5" x2="19" y2="19"></line>
                </svg>
            </button>
            <div class="player-track-info">
                <span class="player-track-name" id="trackName">Loading...</span>
                <span class="player-track-artist">Elliptical Explorer OST</span>
            </div>
            <div class="player-volume">
                <button class="player-btn" id="muteBtn" aria-label="Toggle mute">
                    <svg id="volumeOnIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <svg id="volumeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                </button>
                <input type="range" id="volumeSlider" class="volume-slider"
                       min="0" max="1" step="0.01" value="0.5">
            </div>
            <button class="player-btn" id="trackListBtn" aria-label="Toggle track list">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="player-tracklist" id="trackList"></div>
    </div>

    <!-- Music Enable Overlay -->
    <div class="music-enable-overlay" id="musicEnableOverlay">
        Click anywhere to enable music
    </div>

    <!-- Hidden audio element -->
    <audio id="audioElement" preload="none"></audio>

    <!-- Scripts -->
    <script src="js/particles.js"></script>
    <script src="js/music-player.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
